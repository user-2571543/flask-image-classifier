{% extends "base.html" %}

{% block title %}エラー {{ code }}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="display-1 text-danger mb-3">{{ code }}</div>
        <h2 class="mb-4">{{ message }}</h2>
        <p class="text-muted mb-4">
            {% if code == 404 %}
                申し訳ございません。お探しのページが見つかりません。
            {% elif code == 500 %}
                申し訳ございません。サーバーに予期しないエラーが発生しました。
            {% endif %}
        </p>
        <a href="{{ url_for('index') }}" class="btn btn-primary">トップページに戻る</a>
    </div>
</div>
{% endblock %}
